<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kerodex | Private-Party Car Marketplace</title>
    <meta name="description" content="Kerodex is a minimalist private-party car marketplace with verified listings, fair prices, and no dealer markup." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://kerodexofficial.com/" />
    <link rel="icon" type="image/png" href="/assets/darkmodeNonTransparent.png" />
    <link rel="apple-touch-icon" href="/assets/darkmodeNonTransparent.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/darkmodeNonTransparent.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/darkmodeNonTransparent.png" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="preload" href="/assets/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/assets/fonts/plus-jakarta-sans-latin.woff2" as="font" type="font/woff2" crossorigin />
    <meta property="og:title" content="Kerodex | Private-Party Car Marketplace" />
    <meta property="og:description" content="Kerodex is a minimalist private-party car marketplace with verified listings, fair prices, and no dealer markup." />
    <meta property="og:url" content="https://kerodexofficial.com/" />
    <meta property="og:site_name" content="Kerodex" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://kerodexofficial.com/assets/darkmodeNonTransparent.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kerodex | Private-Party Car Marketplace" />
    <meta name="twitter:description" content="Kerodex is a minimalist private-party car marketplace with verified listings, fair prices, and no dealer markup." />
    <meta name="twitter:image" content="https://kerodexofficial.com/assets/darkmodeNonTransparent.png" />
    <script id="kerodex-home-schema" type="application/ld+json">
      [
        {
          "@context": "https://schema.org",
          "@type": "Organization",
          "name": "Kerodex",
          "url": "https://kerodexofficial.com",
          "logo": "https://kerodexofficial.com/assets/darkmodeNonTransparent.png",
          "email": "founder@kerodexofficial.com",
          "sameAs": [
            "https://www.instagram.com/kerodexofficial",
            "https://www.tiktok.com/@kerodexofficial",
            "https://www.linkedin.com/company/kerodexofficial",
            "https://x.com/kerodexofficial"
          ]
        },
        {
          "@context": "https://schema.org",
          "@type": "WebSite",
          "name": "Kerodex",
          "url": "https://kerodexofficial.com",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://kerodexofficial.com/cars?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const prefix = '/vehicle/';
        if (!window.location.pathname.startsWith(prefix)) return;
        const id = decodeURIComponent(window.location.pathname.slice(prefix.length));
        if (!id) return;
        const token = window.localStorage.getItem('kerodex-token');
        const promise = fetch(`/api/listings/${encodeURIComponent(id)}`, {
          headers: token ? { authorization: `Bearer ${token}` } : {}
        }).then(async (response) => {
          const listing = await response.json();
          if (!response.ok) throw new Error(listing.error || 'Unable to load listing.');
          let images = listing.images;
          if (typeof images === 'string') {
            try { images = JSON.parse(images); } catch { images = [images]; }
          }
          const firstImage = Array.isArray(images) ? images[0] : images;
          if (firstImage) {
            const preload = document.createElement('link');
            preload.rel = 'preload';
            preload.as = 'image';
            preload.href = firstImage;
            preload.fetchPriority = 'high';
            document.head.appendChild(preload);
          }
          return listing;
        });
        window.__KERODEX_LISTING_PREFETCH__ = { id, promise };
      })();
    </script>
    <script type="module" src="/src/route-preload.ts"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
