<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Kerodex | Search results</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQX8VgKq9RRG4wI7E9jhdT5q7wS0Bl2M="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css?v=29" />
  </head>
  <body class="results-body">
    <header class="results-topbar">
      <a class="brand" href="/" aria-label="Kerodex home">
        <img class="logo-light" src="/assets/kerodex-logo-transparent-dark.png" alt="Kerodex" />
        <img class="logo-dark" src="/assets/kerodex-logo-transparent-light.png" alt="Kerodex" />
      </a>
      <form class="results-search" id="resultsSearch">
        <label>
          <span>Where</span>
          <input name="q" type="search" placeholder="Search cars, makes, cities" autocomplete="off" />
        </label>
        <label>
          <span>Make</span>
          <select name="make">
            <option value="">Any make</option>
            <option>Porsche</option>
            <option>Toyota</option>
            <option>Tesla</option>
            <option>BMW</option>
            <option>Rivian</option>
            <option>Lexus</option>
            <option>Ford</option>
            <option>Audi</option>
            <option>Honda</option>
            <option>Subaru</option>
            <option>Mercedes-Benz</option>
            <option>Mazda</option>
            <option>Hyundai</option>
            <option>Jeep</option>
            <option>Kia</option>
            <option>Chevrolet</option>
          </select>
        </label>
        <label>
          <span>Price</span>
          <select name="maxPrice">
            <option value="">Any price</option>
            <option value="35000">Under $35k</option>
            <option value="40000">Under $40k</option>
            <option value="55000">Under $55k</option>
          </select>
        </label>
        <label>
          <span>Mileage</span>
          <select name="maxMileage">
            <option value="">Any mileage</option>
            <option value="25000">Under 25k</option>
            <option value="40000">Under 40k</option>
            <option value="50000">Under 50k</option>
          </select>
        </label>
        <label>
          <span>Age</span>
          <select name="year">
            <option value="">Any</option>
            <option value="2024">2024+</option>
            <option value="2022">2022+</option>
            <option value="2020">2020+</option>
          </select>
        </label>
        <button class="nav-search-button" type="submit" aria-label="Search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Zm5.4-1.8 4.3 4.2" />
          </svg>
        </button>
      </form>
      <div class="results-actions">
        <button class="nav-pill" type="button">Ask Kerodex</button>
        <button class="profile-toggle" id="resultsTheme" type="button" aria-label="Toggle dark mode">
          <svg class="menu-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16" />
            <path d="M4 12h16" />
            <path d="M4 17h16" />
          </svg>
          <svg class="user-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12.6a4.1 4.1 0 1 0 0-8.2 4.1 4.1 0 0 0 0 8.2ZM4.8 20.2a7.5 7.5 0 0 1 14.4 0" />
          </svg>
        </button>
      </div>
    </header>

    <div class="results-filterbar" aria-label="Search filters">
      <button type="button">Price</button>
      <button type="button">Vehicle type</button>
      <button type="button">Make &amp; model</button>
      <button type="button">Years</button>
      <button type="button">Mileage</button>
      <button type="button">Fuel type</button>
      <button type="button">Clean title</button>
      <button type="button">All filters</button>
      <div class="view-toggle" aria-label="View mode">
        <button class="active" type="button" data-results-view="grid">Grid</button>
        <button type="button" data-results-view="map">Map</button>
      </div>
    </div>

    <main class="results-shell">
      <section class="results-heading">
        <h1 id="resultsTitle">Cars available</h1>
        <p id="resultsSubtitle">Private-party listings matched to your search.</p>
      </section>
      <section class="results-grid" id="resultsGrid" aria-live="polite"></section>
      <section class="results-map-view" id="resultsMapView" hidden>
        <div class="results-map-list" id="resultsMapList"></div>
        <div class="results-map-panel">
          <div id="resultsMap"></div>
        </div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/search.js?v=29"></script>
  </body>
</html>
