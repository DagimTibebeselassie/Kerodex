name: Bug report
description: Report something broken in Kerodex.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: I clicked...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Page or route
      placeholder: /cars, /sell, /vehicle/...
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Web marketplace
        - Admin dashboard
        - API/backend
        - Deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, logs, or notes
