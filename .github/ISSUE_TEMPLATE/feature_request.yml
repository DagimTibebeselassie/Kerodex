name: Feature request
description: Suggest a product or engineering improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Buying/search
        - Selling/listing creation
        - Messaging
        - Verification/trust
        - Admin/moderation
        - Infrastructure
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes or examples
