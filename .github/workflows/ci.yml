name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run smoke tests
        run: npm test

  repo-health:
    name: Repository health
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Required repository files
        run: |
          test -f README.md
          test -f NOTICE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CODEOWNERS

      - name: Ensure secrets are not committed
        run: |
          ! grep -RIn --exclude-dir=.git --exclude-dir=.github --exclude=README.md --exclude=SECURITY.md "AWS_SECRET_ACCESS_KEY\|GOOGLE_CLIENT_SECRET\|APPLE_CLIENT_SECRET\|STRIPE_SECRET_KEY" .
