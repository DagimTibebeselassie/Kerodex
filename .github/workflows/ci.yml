name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: API syntax and smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Syntax check API files
        run: |
          node --check apps/api/server.js
          node --check apps/api/store.js
          node --check apps/api/marketcheck.js
          node --check apps/api/vehicle-presence.js

      - name: Run smoke tests
        run: npm test

  web:
    name: Web build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web-react/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web-react
        run: npm ci

      - name: Build web app
        working-directory: apps/web-react
        run: npm run build

  repo-health:
    name: Repository health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Required repository files
        run: |
          test -f README.md
          test -f NOTICE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CODEOWNERS
          test -f .editorconfig
          test -f .nvmrc
          test -f .github/dependabot.yml
          test -f .github/pull_request_template.md

      - name: Ensure local env files are not tracked
        run: |
          tracked_env_files="$(git ls-files | grep -E '(^|/)\.env(\.|$)' | grep -vE '(^|/)\.env\.example$' || true)"
          if [ -n "$tracked_env_files" ]; then
            echo "$tracked_env_files"
            exit 1
          fi

      - name: Scan for committed secret patterns
        run: |
          ! grep -RIn \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude=.env.example \
            --exclude=README.md \
            --exclude=SECURITY.md \
            --exclude=security-hardening-report.md \
            --exclude=ci.yml \
            -E 'AKIA[0-9A-Z]{16}|GOCSPX-|sk-[A-Za-z0-9_-]{20,}|AWS_SECRET_ACCESS_KEY=[^[:space:]]+|DATABASE_URL=postgres[^[:space:]]+|JWT_SECRET=[^[:space:]]+|OPENAI_API_KEY=[^[:space:]]+' .

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
