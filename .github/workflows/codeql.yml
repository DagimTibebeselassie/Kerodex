name: CodeQL

on:
  workflow_dispatch:

# CodeQL upload requires GitHub code scanning to be enabled for the repository.
# Keep this workflow available for manual runs after code scanning is enabled,
# but avoid failing every push/PR while the repository setting is off.

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
